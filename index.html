
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <script>
      // 🥋 OSS SENSEI: SILENCIADOR COMPLETO E INVIOLÁVEL DE WEBSOCKET (EXECUÇÃO ULTRA-PRECOCE)
      (function() {
        if (typeof window !== "undefined") {
          class NoOpWebSocket {
            static CONNECTING = 0;
            static OPEN = 1;
            static CLOSING = 2;
            static CLOSED = 3;
            
            readyState = 3; // CLOSED
            CONNECTING = 0;
            OPEN = 1;
            CLOSING = 2;
            CLOSED = 3;
            binaryType = "blob";
            bufferedAmount = 0;
            extensions = "";
            protocol = "";
            url = "";
            
            onopen = null;
            onerror = null;
            onclose = null;
            onmessage = null;
            
            _listeners = {};
            
            constructor(url, protocols) {
              this.url = String(url);
              setTimeout(() => {
                const eventPayload = { wasClean: true, code: 1000, reason: "WebSocket disabled globally" };
                if (typeof this.onclose === 'function') {
                  try {
                    this.onclose(eventPayload);
                  } catch (_) {}
                }
                this.dispatchEvent(new MessageEvent("close", { data: eventPayload }));
              }, 10);
            }
            
            send(data) {}
            close(code, reason) {
              this.readyState = 3;
            }
            
            addEventListener(type, callback) {
              if (!this._listeners[type]) {
                this._listeners[type] = [];
              }
              this._listeners[type].push(callback);
            }
            
            removeEventListener(type, callback) {
              if (this._listeners[type]) {
                this._listeners[type] = this._listeners[type].filter(cb => cb !== callback);
              }
            }
            
            dispatchEvent(event) {
              const type = event.type || "close";
              const listeners = this._listeners[type] || [];
              listeners.forEach(cb => {
                try {
                  cb.call(this, event);
                } catch (_) {}
              });
              return true;
            }
          }
          
          try {
            Object.defineProperty(window, "WebSocket", {
              value: NoOpWebSocket,
              writable: false,
              configurable: false
            });
            if (typeof globalThis !== 'undefined') {
              Object.defineProperty(globalThis, "WebSocket", {
                value: NoOpWebSocket,
                writable: false,
                configurable: false
              });
            }
          } catch (_) {
            window.WebSocket = NoOpWebSocket;
            if (typeof globalThis !== 'undefined') {
              globalThis.WebSocket = NoOpWebSocket;
            }
          }
          
          try {
            const originalFetch = window.fetch;
            const newFetch = function(input, init) {
              let url = "";
              if (typeof input === "string") {
                url = input;
              } else if (input && typeof input === "object" && "url" in input) {
                url = String(input.url);
              } else {
                url = String(input);
              }
              if (url.startsWith("ws://") || url.startsWith("wss://")) {
                return Promise.resolve(new Response(null, { status: 200 }));
              }
              return originalFetch.apply(this, arguments);
            };
            
            Object.defineProperty(window, "fetch", {
              value: newFetch,
              writable: false,
              configurable: false
            });
            if (typeof globalThis !== 'undefined') {
              Object.defineProperty(globalThis, "fetch", {
                value: newFetch,
                writable: false,
                configurable: false
              });
            }
          } catch (_) {
            // fallback if read-only or error
          }
          
          window.addEventListener("unhandledrejection", (event) => {
            const reason = String(event.reason?.message || event.reason || "");
            if (reason.includes("WebSocket") || reason.includes("closed without opened") || reason.includes("closed")) {
              event.preventDefault();
              event.stopPropagation();
            }
          });
          
          window.addEventListener("error", (event) => {
            const message = String(event.message || "");
            if (message.includes("WebSocket") || message.includes("closed without opened") || message.includes("closed")) {
              event.preventDefault();
              event.stopPropagation();
            }
          }, true);
        }
      })();
    </script>
