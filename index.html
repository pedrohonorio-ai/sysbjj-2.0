
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script>
      // 🥋 OSS SENSEI: SILENCIADOR COMPLETO E INVIOLÁVEL DE WEBSOCKET (EXECUÇÃO ULTRA-PRECOCE)
      (function() {
        if (typeof window !== "undefined") {
          class NoOpWebSocket {
            static CONNECTING = 0;
            static OPEN = 1;
            static CLOSING = 2;
            static CLOSED = 3;
            
            readyState = 3; // CLOSED
            CONNECTING = 0;
            OPEN = 1;
            CLOSING = 2;
            CLOSED = 3;
            binaryType = "blob";
            bufferedAmount = 0;
            extensions = "";
            protocol = "";
            url = "";
            
            onopen = null;
            onerror = null;
            onclose = null;
            onmessage = null;
            
            _listeners = {};
            
            constructor(url, protocols) {
              this.url = String(url);
              setTimeout(() => {
                const eventPayload = { wasClean: true, code: 1000, reason: "WebSocket disabled globally" };
                if (typeof this.onclose === 'function') {
                  try {
                    this.onclose(eventPayload);
                  } catch (_) {}
                }
                this.dispatchEvent(new MessageEvent("close", { data: eventPayload }));
              }, 10);
            }
            
            send(data) {}
            close(code, reason) {
              this.readyState = 3;
            }
            
            addEventListener(type, callback) {
              if (!this._listeners[type]) {
                this._listeners[type] = [];
              }
              this._listeners[type].push(callback);
            }
            
            removeEventListener(type, callback) {
              if (this._listeners[type]) {
                this._listeners[type] = this._listeners[type].filter(cb => cb !== callback);
              }
            }
            
            dispatchEvent(event) {
              const type = event.type || "close";
              const listeners = this._listeners[type] || [];
              listeners.forEach(cb => {
                try {
                  cb.call(this, event);
                } catch (_) {}
              });
              return true;
            }
          }
          
          try {
            Object.defineProperty(window, "WebSocket", {
              value: NoOpWebSocket,
              writable: false,
              configurable: false
            });
            if (typeof globalThis !== 'undefined') {
              Object.defineProperty(globalThis, "WebSocket", {
                value: NoOpWebSocket,
                writable: false,
                configurable: false
              });
            }
          } catch (_) {
            window.WebSocket = NoOpWebSocket;
            if (typeof globalThis !== 'undefined') {
              globalThis.WebSocket = NoOpWebSocket;
            }
          }
          
          try {
            const originalFetch = window.fetch;
            const newFetch = function(input, init) {
              let url = "";
              if (typeof input === "string") {
                url = input;
              } else if (input && typeof input === "object" && "url" in input) {
                url = String(input.url);
              } else {
                url = String(input);
              }
              if (url.startsWith("ws://") || url.startsWith("wss://")) {
                return Promise.resolve(new Response(null, { status: 200 }));
              }
              return originalFetch.apply(this, arguments);
            };
            
            Object.defineProperty(window, "fetch", {
              value: newFetch,
              writable: false,
              configurable: false
            });
            if (typeof globalThis !== 'undefined') {
              Object.defineProperty(globalThis, "fetch", {
                value: newFetch,
                writable: false,
                configurable: false
              });
            }
          } catch (_) {
            // fallback if read-only or error
          }
          
          window.addEventListener("unhandledrejection", (event) => {
            const reason = String(event.reason?.message || event.reason || "");
            if (reason.includes("WebSocket") || reason.includes("closed without opened") || reason.includes("closed")) {
              event.preventDefault();
              event.stopPropagation();
            }
          });
          
          window.addEventListener("error", (event) => {
            const message = String(event.message || "");
            if (message.includes("WebSocket") || message.includes("closed without opened") || message.includes("closed")) {
              event.preventDefault();
              event.stopPropagation();
              return;
            }

            // 🥋 DIAGNÓSTICO SENSEI DA TELA BRANCA
            // Evita a tela totalmente branca exibindo um painel interativo de integridade em HTML puro
            setTimeout(() => {
              const root = document.getElementById("root");
              if (root && (!root.innerHTML || root.innerHTML.trim() === "")) {
                const errorMsg = event.message || (event.error ? event.error.message : "Erro desconhecido de execução.");
                const errorStack = event.error ? event.error.stack : "";
                
                root.style.all = "initial";
                root.innerHTML = `
                  <div style="background: #090d16; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: system-ui, -apple-system, sans-serif; padding: 24px; box-sizing: border-box;">
                    <div style="max-width: 620px; width: 100%; border: 1px solid rgba(239, 68, 68, 0.3); background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); padding: 40px; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); text-align: center;">
                      <div style="width: 80px; height: 80px; background: rgba(239, 68, 68, 0.1); border: 2px solid #ef4444; border-radius: 28px; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px auto; font-size: 36px; box-shadow: 0 0 40px rgba(239, 68, 68, 0.25)">🥋</div>
                      <h1 style="font-size: 20px; font-weight: 900; letter-spacing: 0.05em; text-transform: uppercase; margin: 0 0 8px 0; color: #fca5a5;">DIAGNÓSTICO SENSEI • TELA BRANCA EVITADA</h1>
                      <p style="font-size: 13px; color: #94a3b8; margin: 0 0 24px 0; line-height: 1.6;">Sensei, ocorreu um erro técnico ao carregar os scripts principais do navegador, impedindo a montagem do React:</p>
                      
                      <div style="background: #020617; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; margin-bottom: 24px; text-align: left;">
                        <span style="color: #fca5a5; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-bottom: 6px;">Mensagem do Erro:</span>
                        <pre style="margin: 0; color: #f1f5f9; font-size: 12px; white-space: pre-wrap; font-family: 'Fira Code', 'Courier New', monospace; font-weight: bold; line-height: 1.5; word-break: break-all;">${errorMsg}</pre>
                        
                        ${errorStack ? `
                          <span style="color: #64748b; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-top: 16px; margin-bottom: 6px;">Rastro Tecnológico (Stack):</span>
                          <pre style="margin: 0; color: #94a3b8; font-size: 10px; white-space: pre-wrap; font-family: 'Fira Code', 'Courier New', monospace; overflow-x: auto; max-height: 140px; line-height: 1.4; word-break: break-all;">${errorStack}</pre>
                        ` : ''}
                      </div>

                      <div style="background: rgba(37, 99, 235, 0.05); border: 1px solid rgba(37, 99, 235, 0.15); border-radius: 16px; padding: 16px; margin-bottom: 32px; text-align: left; font-size: 11px; color: #93c5fd; line-height: 1.6;">
                        <strong>Recomendações do Sensei:</strong>
                        <ul style="margin: 6px 0 0 0; padding-left: 18px;">
                          <li>Pode ser uma falha de conexão temporária que impediu de baixar parcelas do script (chunk load error).</li>
                          <li>Limpar o cache do navegador ou tentar uma aba anônima (Ctrl+Shift+N).</li>
                          <li>Se o problema persistir após recompilar, revise as variáveis de ambiente.</li>
                        </ul>
                      </div>

                      <button onclick="window.location.reload(true)" style="background: #2563eb; color: #fff; border: none; border-radius: 16px; padding: 14px 28px; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; box-shadow: 0 10px 25px rgba(37,99,235,0.3); width: 100%;">RECARREGAR COMPLETO (FORÇAR CACHE)</button>
                    </div>
                  </div>
                `;
              }
            }, 300);
          }, true);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- META -->
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SYSBJJ" />
    <title>SYSBJJ 2.0</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://rsms.me">
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css">
</head>

<body class="selection:bg-blue-600 selection:text-white overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
